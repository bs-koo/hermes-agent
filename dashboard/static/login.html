<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로그인 · GX 업무 비서</title>
  <!-- Pretendard(토스 스타일 한글 폰트) — self-host 가변 폰트(@font-face in styles.css) -->
  <link rel="preload" href="fonts/PretendardVariable.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* 로그인 전용 레이아웃 — 대시보드 토큰(var(--*)) 상속, 색은 styles.css 에서만 가져온다. */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
    }
    .login-card {
      width: 100%;
      max-width: 380px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow-card);
      padding: 36px 30px 30px;
    }
    .login-brand {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 22px;
    }
    .login-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border-radius: 9px;
      background: var(--brand);
    }
    .login-brand-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }
    .login-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin: 0 0 6px;
    }
    .login-sub {
      font-size: 13px;
      color: var(--muted);
      margin: 0 0 22px;
    }
    .login-field { margin-bottom: 14px; }
    .login-field label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .login-input {
      width: 100%;
      height: 46px;
      padding: 0 14px;
      font-size: 14px;
      color: var(--text);
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
      transition: border-color 120ms ease, background 120ms ease;
    }
    .login-input:focus {
      border-color: var(--accent);
      background: var(--bg-card);
    }
    .login-btn {
      width: 100%;
      height: 48px;
      margin-top: 6px;
      font-size: 15px;
      font-weight: 700;
      color: #ffffff;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 120ms ease;
    }
    .login-btn:hover { background: var(--accent-hi); }
    .login-btn:disabled { opacity: 0.6; cursor: default; }
    /* 알림(에러·잠금) — 점 + 작은 텍스트(카드 전체를 빨갛게 칠하지 않는다). */
    .login-alert {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 13px;
      line-height: 1.45;
      color: var(--alarm);
    }
    .login-alert[hidden] { display: none; }
    .login-alert-dot {
      flex: 0 0 auto;
      width: 7px;
      height: 7px;
      margin-top: 5px;
      border-radius: 50%;
      background: var(--alarm);
    }
    @media (prefers-reduced-motion: reduce) {
      .login-input, .login-btn { transition: none; }
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <span class="login-logo" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M4 17l5-9 4 6 3-4 4 7"/></svg>
        </span>
        <span class="login-brand-title">GX 업무 비서</span>
      </div>

      <h1 class="login-title">로그인</h1>
      <p class="login-sub">사업부 공용 계정으로 로그인해 주세요.</p>

      <div class="login-alert" id="login-alert" role="alert" hidden>
        <span class="login-alert-dot" aria-hidden="true"></span>
        <span id="login-alert-text"></span>
      </div>

      <form id="login-form" autocomplete="on">
        <div class="login-field">
          <label for="login-username">아이디</label>
          <input class="login-input" id="login-username" name="username" type="text"
                 autocomplete="username" autocapitalize="off" autocorrect="off" required>
        </div>
        <div class="login-field">
          <label for="login-password">비밀번호</label>
          <input class="login-input" id="login-password" name="password" type="password"
                 autocomplete="current-password" required>
        </div>
        <button type="submit" class="login-btn" id="login-btn">로그인하기</button>
      </form>
    </div>
  </div>

  <script>
    (function () {
      var form = document.getElementById('login-form');
      var btn = document.getElementById('login-btn');
      var alertBox = document.getElementById('login-alert');
      var alertText = document.getElementById('login-alert-text');
      var userEl = document.getElementById('login-username');
      var pwEl = document.getElementById('login-password');

      function showAlert(msg) {
        alertText.textContent = msg;
        alertBox.hidden = false;
      }
      function hideAlert() { alertBox.hidden = true; }

      /* 세션 만료로 돌아온 경우(?expired=1) 안내 메시지 표시 */
      if (/[?&]expired=1(&|$)/.test(window.location.search)) {
        showAlert('세션이 만료되었습니다. 다시 로그인해 주세요');
      }

      form.addEventListener('submit', function (ev) {
        ev.preventDefault();
        hideAlert();
        var username = userEl.value.trim();
        var password = pwEl.value;
        if (!username || !password) {
          showAlert('아이디와 비밀번호를 입력해 주세요');
          return;
        }
        btn.disabled = true;
        btn.textContent = '로그인 중…';
        fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ username: username, password: password })
        }).then(function (r) {
          if (r.ok) {
            window.location.replace('/');
            return null;
          }
          return r.json().then(function (j) { return { status: r.status, body: j || {} }; });
        }).then(function (res) {
          if (!res) return;   /* 2xx → 이미 이동 */
          if (res.status === 429) {
            showAlert((res.body && res.body.error) || '로그인 시도가 너무 많습니다. 잠시 후 다시 시도해 주세요');
          } else {
            showAlert('아이디 또는 비밀번호가 올바르지 않습니다');
          }
          btn.disabled = false;
          btn.textContent = '로그인하기';
          pwEl.value = '';
          pwEl.focus();
        }).catch(function () {
          showAlert('로그인 요청 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요');
          btn.disabled = false;
          btn.textContent = '로그인하기';
        });
      });
    })();
  </script>
</body>
</html>
